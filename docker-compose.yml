version: '3.8'

services:
  database:
    image: mysql:8.0
    container_name: nikahan_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-5elamanya}
      MYSQL_DATABASE: ${DB_NAME:-wedding_invitation}
      MYSQL_USER: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nikahan_be
    restart: always
    depends_on:
      - database
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=database
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-5elamanya}
      - DB_NAME=${DB_NAME:-wedding_invitation}
      - DB_PORT=3306
      - JWT_SECRET=your_super_secret_key_change_this
      - JWT_EXPIRE=7d
    volumes:
      # Mount folder uploads agar file tidak hilang saat container direstart/rebuild
      - ./uploads:/app/uploads

  frontend:
    build:
      context: ../nikahanID-FE
      dockerfile: Dockerfile
    container_name: nikahan_fe
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  db_data:
